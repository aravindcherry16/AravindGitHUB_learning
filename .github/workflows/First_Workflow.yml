name: First_Workflow
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v2
    - name: Set up JDK 19
      uses: actions/setup-java@v2
      with:
        java-version: '19'
        distribution: 'adopt'
    - name: Install Google Chrome and ChromeDriver
      run: |
        sudo apt-get update
        sudo apt-get install -y google-chrome-stable chromium-chromedriver
        which google-chrome || echo "Chrome not found at expected location"
        ls -la /usr/bin/google-chrome* || echo "Checking alternative paths"
    - name: Build with Maven
      run: cd BDDFramework && mvn clean test
